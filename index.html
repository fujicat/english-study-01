function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function App() {
  const [phrases, setPhrases] = useState(DEFAULT_PHRASES);
  const [loaded, setLoaded] = useState(false);
  const [modeId, setModeId] = useState('en2ja');
  const [shuffled, setShuffled] = useState(false);
  const [order, setOrder] = useState(() => DEFAULT_PHRASES.map((_, i) => i));
  const [pos, setPos] = useState(0);
  const [showAnswer, setShowAnswer] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);

  const mode = MODES[modeId];
  const current = phrases[order[pos]];

  useEffect(() => {
    (async () => {
      try {
        const stored = (() => { try { const v = localStorage.getItem('phrases'); return v ? { value: v } : null; } catch(e) { return null; } })();
        if (stored && stored.value) {
          const parsed = JSON.parse(stored.value);
          if (Array.isArray(parsed) && parsed.length > 0) {
            setPhrases(parsed);
          }
        }
      } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    const base = phrases.map((_, i) => i);
    setOrder(shuffled ? shuffleArr(base) : base);
    setPos(0);
    setShowAnswer(false);
  }, [phrases, shuffled]);

  useEffect(() => {
    setShowAnswer(false);
    try { window.speechSynthesis?.cancel(); } catch (e) {}
  }, [modeId]);

  const speak = useCallback((text) => {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    u.rate = 0.9;
    u.pitch = 1;
    window.speechSynthesis.speak(u);
  }, []);

  useEffect(() => {
    if (showAnswer && mode.voice && current) {
      speak(current.en);
    }
  }, [showAnswer, modeId, pos]);

  useEffect(() => {
    if (!showAnswer && mode.autoPlay && current) {
      speak(current.en);
    }
  }, [pos, modeId, showAnswer]);

  const next = () => {
    try { window.speechSynthesis?.cancel(); } catch (e) {}
    setShowAnswer(false);
    setPos(p => Math.min(p + 1, order.length - 1));
  };
  const prev = () => {
    try { window.speechSynthesis?.cancel(); } catch (e) {}
    setShowAnswer(false);
    setPos(p => Math.max(p - 1, 0));
  };
  const restart = () => {
    try { window.speechSynthesis?.cancel(); } catch (e) {}
    setShowAnswer(false);
    setPos(0);
    if (shuffled) setOrder(shuffleArr(phrases.map((_, i) => i)));
  };

  useEffect(() => {
    const handler = (e) => {
      if (settingsOpen) return;
      const tag = e.target.tagName;
      if (tag === 'TEXTAREA' || tag === 'INPUT') return;
      if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
      else if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        if (!showAnswer) setShowAnswer(true);
        else if (mode.voice) speak(current?.en || '');
        else next();
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  });

  if (!loaded) {
    return (
      <div className="paper min-h-screen flex items-center justify-center">
        <span className="font-mono ink-muted text-sm tracking-widest">LOADING…</span>
        <style>{STYLE}</style>
      </div>
    );
  }

  if (!current) {
    return (
      <div className="paper min-h-screen flex items-center justify-center">
        <span className="font-serif-ja ink">問題集が空です。設定から読み込んでください。</span>
        <style>{STYLE}</style>
      </div>
    );
  }

  const isAudioQuestion = mode.q === 'audio';
  const questionText = isAudioQuestion ? '' : (mode.q === 'en' ? current.en : current.ja);
  const answerText   = mode.a === 'en' ? current.en : current.ja;
  const qIsEn = mode.q === 'en';
  const aIsEn = mode.a === 'en';

  return (
    <div className="paper min-h-screen ink">
      <style>{STYLE}</style>

      <div className="max-w-3xl mx-auto px-4 py-6 md:py-10">
        {/* HEADER */}
        <header className="mb-6">
          <div className="flex items-start justify-between gap-4">
            <div className="min-w-0">
              <div className="font-display text-4xl md:text-5xl tracking-wider red-ink leading-none">
                HOMESTAY ENGLISH
              </div>
              <div className="app-title-rule my-2.5 max-w-xs"></div>
              <div className="font-serif-ja text-xs md:text-sm ink-soft">
                ホームステイイングリッシュ 第1章 暗記用フレーズ集
              </div>
            </div>
            <button
              onClick={() => setSettingsOpen(true)}
              className="btn-ghost rounded-full p-2.5 shrink-0"
              title="設定"
              aria-label="設定"
            >
              <Settings size={18} />
            </button>
          </div>
        </header>

        {/* CONTROL BAR */}
        <div className="paper-card rounded-2xl px-4 py-3 mb-5 flex flex-wrap items-center justify-between gap-3">
          <div className="flex gap-1 flex-wrap">
            {Object.entries(MODES).map(([id, m]) => (
              <button
                key={id}
                onClick={() => setModeId(id)}
                className={`tab ${modeId === id ? 'tab-active' : ''} font-serif-ja px-3 py-1.5 rounded-full text-xs md:text-sm`}
              >
                {m.label}
              </button>
            ))}
          </div>
          <button
            onClick={() => setShuffled(s => !s)}
            className={`tab ${shuffled ? 'tab-active' : ''} px-3 py-1.5 rounded-full text-xs md:text-sm font-serif-ja flex items-center gap-1.5`}
            title="出題順を切替"
          >
            <Shuffle size={12} />
            {shuffled ? 'ランダム' : '番号順'}
          </button>
        </div>

        {/* MAIN CARD */}
        <main>
          <div className="paper-card rounded-2xl p-6 md:p-12">
            <div className="flex items-center justify-between mb-8">
              <span className="serial-num">No. {String(current.n).padStart(3, '0')}</span>
              <span className="serial-num">{pos + 1} / {order.length}</span>
            </div>

            <div className="text-center flex flex-col justify-center" style={{ minHeight: 200 }}>
              {isAudioQuestion ? (
                <div className="flex flex-col items-center gap-6">
                  <Volume2 size={96} className="ink-soft" />
                  <button
                    onClick={() => speak(current.en)}
                    className="btn-primary rounded-full px-6 py-3 flex items-center gap-2 font-serif-ja text-sm"
                  >
                    <Volume2 size={18} />
                    REPLAY
                  </button>
                </div>
              ) : (
                <div className={qIsEn ? 'font-serif-en' : 'font-serif-ja'}>
                  <p className="text-2xl md:text-3xl leading-snug ink">
                    {questionText}
                  </p>
                </div>
              )}

              {showAnswer && (
                <div className="mt-8 reveal">
                  <div className="dashed-rule mb-6"></div>
                  <div className="font-mono text-xs ink-muted tracking-widest mb-4">
                    {mode.voice ? 'PRONUNCIATION' : 'ANSWER'}
                  </div>
                  {mode.voice ? (
                    <div className="flex flex-col items-center gap-4">
                      <button
                        onClick={() => speak(current.en)}
                        className="btn-primary rounded-full px-6 py-3 flex items-center gap-2 font-serif-ja text-sm"
                      >
                        <Volume2 size={18} />
                        もう一度聞く
                      </button>
                      <p className="font-serif-en text-lg md:text-xl ink-soft italic">
                        {current.en}
                      </p>
                    </div>
                  ) : (
                    <div className={aIsEn ? 'font-serif-en' : 'font-serif-ja'}>
                      <p className="text-2xl md:text-3xl leading-snug red-ink">
                        {answerText}
                      </p>
                    </div>
                  )}
                </div>
              )}
            </div>

            {!showAnswer && (
              <div className="mt-8 flex justify-center">
                <button
                  onClick={() => setShowAnswer(true)}
                  className="btn-primary rounded-full px-8 py-3 flex items-center gap-2 font-serif-ja"
                >
                  {mode.voice ? (
                    <><Volume2 size={18} />答えを聞く</>
                  ) : (
                    <><Eye size={18} />答えを表示</>
                  )}
                </button>
              </div>
            )}
          </div>

          {/* NAV */}
          <div className="flex items-center justify-between gap-3 mt-5">
            <button
              onClick={prev}
              disabled={pos === 0}
              className="btn-ghost rounded-full px-4 md:px-5 py-2.5 flex items-center gap-1.5 font-serif-ja text-sm"
            >
              <ChevronLeft size={18} />
              前へ
            </button>

            <button
              onClick={restart}
              className="btn-ghost rounded-full p-2.5"
              title="最初から(ランダム時は再シャッフル)"
              aria-label="最初に戻る"
            >
              <RotateCcw size={15} />
            </button>

            <button
              onClick={next}
              disabled={pos === order.length - 1}
              className="btn-primary rounded-full px-4 md:px-5 py-2.5 flex items-center gap-1.5 font-serif-ja text-sm"
            >
              次へ
              <ChevronRight size={18} />
            </button>
          </div>

          <div className="text-center mt-6 font-mono text-xs ink-muted tracking-widest hidden md:block">
            ← / → 移動  ・  SPACE 答えを見る / 次へ
          </div>
        </main>
      </div>

      {settingsOpen && (
        <SettingsModal
          phrases={phrases}
          setPhrases={setPhrases}
          onClose={() => setSettingsOpen(false)}
          defaultPhrases={DEFAULT_PHRASES}
        />
      )}
    </div>
  );
}

function SettingsModal({ phrases, setPhrases, onClose, defaultPhrases }) {
  const [jsonText, setJsonText] = useState('');
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');
  const [confirmReset, setConfirmReset] = useState(false);
  const fileRef = useRef(null);

  const clearMsgs = () => { setError(''); setSuccess(''); };

  const importFromText = async (text) => {
    clearMsgs();
    try {
      const parsed = JSON.parse(text);
      if (!Array.isArray(parsed)) throw new Error('配列形式である必要があります');
      if (parsed.length === 0) throw new Error('空の配列です');
      const valid = parsed.every(item =>
        item && typeof item === 'object' &&
        typeof item.en === 'string' && item.en.length > 0 &&
        typeof item.ja === 'string' && item.ja.length > 0
      );
      if (!valid) throw new Error('各項目に "en"(英文)と "ja"(日本語訳)が必要です');
      const normalized = parsed.map((p, i) => ({
        n: (typeof p.n === 'number' || typeof p.n === 'string') ? p.n : i + 1,
        en: p.en,
        ja: p.ja,
      }));
      setPhrases(normalized);
      try {
        localStorage.setItem('phrases', JSON.stringify(normalized));
      } catch (e) {}
      setSuccess(`${normalized.length} 件のフレーズを読み込みました`);
      setJsonText('');
    } catch (e) {
      setError(e.message || '読み込みに失敗しました');
    }
  };

  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const text = await file.text();
      await importFromText(text);
    } catch (err) {
      setError('ファイルの読み込みに失敗しました');
    } finally {
      e.target.value = '';
    }
  };

  const exportJson = () => {
    clearMsgs();
    try {
      const data = JSON.stringify(phrases, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'phrases.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) {
      setError('ダウンロードに失敗しました');
    }
  };

  const doReset = async () => {
    setPhrases(defaultPhrases);
    try { localStorage.removeItem('phrases'); } catch (e) {}
    setConfirmReset(false);
    setSuccess('初期データに戻しました');
  };

  return (
    <div
      className="fixed inset-0 flex items-center justify-center p-4 z-50"
      style={{ background: 'rgba(28, 25, 23, 0.5)' }}
      onClick={onClose}
    >
      <div
        className="paper-card rounded-2xl max-w-lg w-full overflow-y-auto" style={{ maxHeight: "90vh" }}
        onClick={e => e.stopPropagation()}
      >
        <div className="flex items-center justify-between px-6 py-5 sticky top-0 z-10" style={{ background: 'var(--paper-card)', borderBottom: '1px solid var(--rule-soft)' }}>
          <div>
            <h2 className="font-display text-2xl tracking-wider red-ink leading-none">SETTINGS</h2>
            <div className="font-serif-ja text-xs ink-soft mt-1">設定</div>
          </div>
          <button onClick={onClose} className="btn-ghost rounded-full p-2" aria-label="閉じる">
            <X size={16} />
          </button>
        </div>

        <div className="px-6 py-5 space-y-6">
          <section>
            <div className="font-mono text-xs ink-muted tracking-widest mb-2">CURRENT SET</div>
            <p className="font-serif-ja ink">
              <span className="font-mono text-lg">{phrases.length}</span> 件のフレーズ
            </p>
          </section>

          {error && (
            <div className="rounded-xl p-3 flex gap-2.5 items-start" style={{ background: 'var(--red-bg)' }}>
              <AlertCircle size={16} className="red-ink shrink-0 mt-0.5" />
              <p className="text-sm red-ink font-serif-ja">{error}</p>
            </div>
          )}
          {success && (
            <div className="rounded-xl p-3 flex gap-2.5 items-start" style={{ background: 'rgba(45, 90, 61, 0.08)' }}>
              <Check size={16} className="shrink-0 mt-0.5" style={{ color: 'var(--green)' }} />
              <p className="text-sm font-serif-ja" style={{ color: 'var(--green)' }}>{success}</p>
            </div>
          )}

          <section>
            <div className="font-mono text-xs ink-muted tracking-widest mb-3">IMPORT / EXPORT</div>
            <div className="flex flex-col gap-2">
              <input
                type="file"
                accept=".json,application/json"
                ref={fileRef}
                onChange={handleFile}
                style={{ display: 'none' }}
              />
              <button
                onClick={() => fileRef.current?.click()}
                className="btn-ghost rounded-xl px-4 py-3 flex items-center gap-2.5 justify-center font-serif-ja text-sm"
              >
                <Upload size={15} />
                JSONファイルを読み込む(上書き)
              </button>
              <button
                onClick={exportJson}
                className="btn-ghost rounded-xl px-4 py-3 flex items-center gap-2.5 justify-center font-serif-ja text-sm"
              >
                <Download size={15} />
                現在のデータをダウンロード
              </button>
            </div>
          </section>

          <section>
            <div className="font-mono text-xs ink-muted tracking-widest mb-2">PASTE JSON</div>
            <textarea
              value={jsonText}
              onChange={e => setJsonText(e.target.value)}
              placeholder={'[\n  {"n": 1, "en": "Hello", "ja": "こんにちは"}\n]'}
              className="json-input w-full rounded-xl p-3 h-36 resize-y"
            />
            <button
              onClick={() => importFromText(jsonText)}
              disabled={!jsonText.trim()}
              className="mt-2 btn-primary rounded-xl px-4 py-2 text-sm font-serif-ja"
            >
              貼り付けたJSONを読み込む
            </button>
          </section>

          <section>
            <div className="font-mono text-xs ink-muted tracking-widest mb-2">JSON FORMAT</div>
            <div className="rounded-xl p-3.5" style={{ background: 'rgba(28, 25, 23, 0.04)' }}>
              <pre className="font-mono text-xs ink-soft whitespace-pre-wrap leading-relaxed">{`[
  {"n": 1, "en": "Hi.", "ja": "こんにちは。"},
  {"n": 2, "en": "Good morning", "ja": "おはよう。"}
]`}</pre>
              <p className="mt-3 font-serif-ja text-xs ink-soft leading-relaxed">
                <span className="red-ink font-mono">n</span> (任意・番号) ・
                <span className="red-ink font-mono"> en</span> (必須・英文) ・
                <span className="red-ink font-mono"> ja</span> (必須・日本語訳)
              </p>
            </div>
          </section>

          <section className="pt-2" style={{ borderTop: '1px solid var(--rule-soft)' }}>
            <div className="font-mono text-xs ink-muted tracking-widest mb-3 mt-3">RESET</div>
            {confirmReset ? (
              <div className="rounded-xl p-4" style={{ background: 'var(--red-bg)' }}>
                <p className="text-sm font-serif-ja mb-3 ink">
                  現在のデータが初期データ(238件)に置き換わります。本当に戻しますか?
                </p>
                <div className="flex gap-2">
                  <button onClick={doReset} className="btn-primary rounded-lg px-4 py-2 text-sm font-serif-ja">
                    はい、戻す
                  </button>
                  <button onClick={() => setConfirmReset(false)} className="btn-ghost rounded-lg px-4 py-2 text-sm font-serif-ja">
                    キャンセル
                  </button>
                </div>
              </div>
            ) : (
              <button
                onClick={() => setConfirmReset(true)}
                className="btn-ghost rounded-xl px-4 py-2.5 text-sm flex items-center gap-2 font-serif-ja"
              >
                <RotateCcw size={14} />
                初期データに戻す
              </button>
            )}
          </section>

          <p className="text-xs ink-muted font-serif-ja leading-relaxed pt-2" style={{ borderTop: '1px solid var(--rule-soft)' }}>
            <span className="block pt-3">
              データはお使いのブラウザに保存されます。同じブラウザで開けば次回も保持されます。
            </span>
          </p>
        </div>
      </div>
    </div>
  );
}

    /* ===== mount ===== */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
